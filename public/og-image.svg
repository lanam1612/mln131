  </text>

  <!-- Stylized Vietnam silhouette (decorative) -->
  <g transform="translate(820 90)" opacity="0.9">
    <path
      d="M180 0 q-25 40 -45 90 q-30 70 -55 130 q-25 70 -40 130 q-15 60 -10 110 q5 60 25 90 q15 22 5 40 q-10 18 -32 22 q-22 4 -8 -18 q14 -22 0 -40 q-22 -28 -38 -82 q-16 -54 -10 -110 q6 -56 26 -110 q22 -56 50 -120 q28 -64 58 -114 q22 -36 38 -50 q14 -12 26 -4 q12 8 10 36 z"
      fill="#DA251D"
      stroke="#9c1812"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- 4 region dots -->
    <circle cx="80" cy="60" r="9" fill="#E63946" stroke="white" stroke-width="3" />
    <circle cx="138" cy="290" r="9" fill="#264653" stroke="white" stroke-width="3" />
    <circle cx="118" cy="330" r="9" fill="#F4A261" stroke="white" stroke-width="3" />
    <circle cx="70" cy="430" r="9" fill="#2A9D8F" stroke="white" stroke-width="3" />
    <!-- Hoàng Sa / Trường Sa marker -->
    <circle cx="230" cy="240" r="4" fill="#DA251D" />
    <circle cx="245" cy="255" r="3" fill="#DA251D" />
    <circle cx="240" cy="380" r="4" fill="#DA251D" />
    <circle cx="252" cy="395" r="3" fill="#DA251D" />
  </g>

  <text x="90" y="585" font-family="'JetBrains Mono', monospace" font-size="20" fill="#71717A" letter-spacing="0.1em">
