<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F5F0" />
      <stop offset="100%" stop-color="#FCE4E2" />
    </linearGradient>
    <linearGradient id="vn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DA251D" />
      <stop offset="100%" stop-color="#9c1812" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative star (Vietnamese flag) -->
  <g transform="translate(140 90) scale(0.6)">
    <circle r="58" fill="#DA251D" />
    <polygon
      points="0,-32 9.4,-12.8 31,-12.8 13.6,1.6 19.6,22.4 0,11.2 -19.6,22.4 -13.6,1.6 -31,-12.8 -9.4,-12.8"
      fill="#FFCD00"
    />
  </g>

  <text x="90" y="240" font-family="'Be Vietnam Pro', sans-serif" font-size="28" font-weight="600" fill="#DA251D" letter-spacing="0.18em">
